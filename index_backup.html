<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="عقارات">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>مدير العروض العقارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #f59e0b;
  --gold-d: #d97706;
  --bg: #0f172a;
  --surf: #1e293b;
  --surf2: #0d1117;
  --border: rgba(255,255,255,.07);
  --text: #f1f5f9;
  --muted: #94a3b8;
  --dim: #475569;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html{height:100%;overflow:hidden;-webkit-text-size-adjust:100%}
body{margin:0;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);height:100%;overflow:hidden;position:fixed;width:100%;top:0;left:0;right:0;bottom:0}
input,select,textarea{font-size:16px!important;font-family:'Tajawal',sans-serif}

#app{display:flex;flex-direction:column;height:100%;width:100%;max-width:560px;margin:0 auto;position:relative}

/* HEADER */
.hdr{
  background:linear-gradient(160deg,#1a2744 0%,#0f172a 100%);
  padding:calc(var(--st) + 12px) 16px 12px;
  border-bottom:1px solid rgba(245,158,11,.18);
  flex-shrink:0;
}
.hdr-row{display:flex;align-items:center;gap:11px}
.hdr-icon{
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--gold),var(--gold-d));
  border-radius:13px;display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 4px 18px rgba(245,158,11,.4);
}
.hdr-title{font-size:16px;font-weight:800;color:var(--text);line-height:1.2}
.hdr-sub{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;margin-top:2px}
.sdot{width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;transition:background .3s}
.sdot.off{background:#ef4444}

/* STATS */
.stats{display:flex;gap:7px;margin-top:11px;overflow-x:auto;padding-bottom:1px;scrollbar-width:none}
.stats::-webkit-scrollbar{display:none}
.stat{flex:0 0 auto;border-radius:10px;padding:7px 14px;text-align:center;border:1px solid;min-width:64px}
.stat-n{font-size:21px;font-weight:900;line-height:1}
.stat-l{font-size:10px;color:var(--muted);margin-top:1px}

/* SCROLL */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:12px 13px 6px;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}

/* TAB BAR */
.tabs{display:flex;background:var(--surf2);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:var(--sb)}
.tab{flex:1;padding:9px 0 7px;border:none;background:transparent;color:var(--dim);font-size:11px;font-family:'Tajawal',sans-serif;cursor:pointer;font-weight:700;border-top:2.5px solid transparent;transition:all .18s;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.tab.on{color:var(--gold);border-top-color:var(--gold)}
.tab-ic{font-size:19px;display:block;margin-bottom:2px}

/* INPUTS */
.inp{width:100%;padding:12px 13px;border-radius:11px;border:1.5px solid #2a3548;background:var(--surf2);color:var(--text);font-size:16px;font-family:'Tajawal',sans-serif;-webkit-appearance:none;outline:none;transition:border-color .18s,box-shadow .18s}
.inp:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
textarea.inp{resize:vertical}
.lbl{display:block;color:var(--muted);font-size:12px;margin-bottom:5px;font-weight:600}
.field{margin-bottom:13px}
.dual{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:13px}

/* BUTTONS */
.btn{border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;-webkit-user-select:none;user-select:none;touch-action:manipulation;width:100%;display:block}
.btn:active{transform:scale(.96)}
.b-gold{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#fff;box-shadow:0 4px 16px rgba(245,158,11,.28)}
.b-red{background:linear-gradient(135deg,#dc2626,#991b1b);color:#fff}
.b-ghost{background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}
.b-green{background:linear-gradient(135deg,#059669,#065f46);color:#fff}

/* CHIP */
.chip{display:inline-block;padding:3px 9px;border-radius:7px;font-size:11px;font-weight:800;color:#fff}

/* DIRECTION GRID */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dbtn{border-radius:11px;padding:12px;font-size:15px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border-width:2px;border-style:solid}
.dbtn:active{transform:scale(.95)}

/* TYPE GRID */
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.tbtn{border-radius:11px;padding:11px 6px;font-size:13px;font-weight:800;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;touch-action:manipulation;border:2px solid #2a3548;background:rgba(255,255,255,.03);color:var(--muted)}
.tbtn.on{border-color:var(--gold);background:rgba(245,158,11,.14);color:var(--gold)}
.tbtn:active{transform:scale(.95)}

/* OFFER CARD */
.card{border-radius:14px;padding:13px 14px;margin-bottom:9px;border-width:1.5px;border-style:solid;cursor:pointer;transition:transform .13s,filter .13s;-webkit-user-select:none;user-select:none;touch-action:manipulation}
.card:active{transform:scale(.985);filter:brightness(.88)}

/* OVERLAY / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fIn .2s ease}
@keyframes fIn{from{opacity:0}to{opacity:1}}
.sheet{background:var(--surf);border-radius:22px 22px 0 0;width:100%;max-width:560px;padding:22px 18px;padding-bottom:calc(22px + var(--sb));max-height:90vh;overflow-y:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;animation:sUp .22s ease}
.sheet::-webkit-scrollbar{display:none}
@keyframes sUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}

/* TOAST */
.toast{position:fixed;top:calc(var(--st) + 14px);left:50%;transform:translateX(-50%);z-index:999;color:#fff;padding:10px 20px;border-radius:12px;font-weight:800;font-size:13px;font-family:'Tajawal',sans-serif;box-shadow:0 6px 24px rgba(0,0,0,.55);white-space:nowrap;max-width:90vw;animation:tIn .22s ease}
@keyframes tIn{from{opacity:0;transform:translate(-50%,10px)}to{opacity:1;transform:translate(-50%,0)}}

/* DETAIL */
.det-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.det-k{color:var(--dim);font-size:13px}
.det-v{color:var(--text);font-size:13px;font-weight:700;max-width:58%;text-align:left}
.act-row{display:flex;gap:9px;margin-top:18px}
.act-row .btn{flex:1}

/* SEARCH ROW */
.srow{display:flex;gap:8px;margin-bottom:12px}
.swrap{flex:1;position:relative}
.sic{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:14px;pointer-events:none}
.sinp{padding-right:36px}
.csvbtn{padding:0 13px;font-size:12px;white-space:nowrap;width:auto}

/* EMPTY */
.empty{text-align:center;color:var(--dim);padding:55px 20px}
.e-ic{font-size:50px;margin-bottom:11px}
.e-t{font-size:15px;font-weight:800;color:var(--muted)}
.e-s{color:var(--dim);font-size:12px;margin-top:5px}

/* INSTALL BANNER */
.install-banner{
  background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(245,158,11,.05));
  border:1px solid rgba(245,158,11,.25);
  border-radius:12px;padding:11px 14px;margin-bottom:13px;
  display:flex;align-items:center;gap:10px;
}
.install-banner-text{flex:1;font-size:12px;color:var(--muted);line-height:1.4}
.install-banner-title{font-size:13px;font-weight:800;color:var(--gold);margin-bottom:2px}
.install-x{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:4px;touch-action:manipulation;line-height:1}

/* SECTION TITLE */
.sec-title{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:900;color:var(--text);margin-bottom:16px}

.form-note{text-align:center;color:var(--dim);font-size:11px;margin-top:14px}

/* LOADING */
.loading{text-align:center;color:var(--dim);padding:50px 20px;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-icon">🏠</div>
      <div style="flex:1;min-width:0">
        <div class="hdr-title">مدير العروض العقارية</div>
        <div class="hdr-sub">
          <span class="sdot" id="sdot"></span>
          <span id="stxt" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">جاري التحميل...</span>
        </div>
      </div>
    </div>
    <div class="stats" id="statsRow"></div>
  </div>

  <!-- Scroll -->
  <div class="scroll" id="scroll"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab on" id="t0" onclick="goTab(0)"><span class="tab-ic">📋</span>العروض</button>
    <button class="tab" id="t1" onclick="goTab(1)"><span class="tab-ic">➕</span>إضافة</button>
    <button class="tab" id="t2" onclick="goTab(2)"><span class="tab-ic">📊</span>إحصائيات</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast" style="display:none"></div>

<!-- Delete Sheet -->
<div class="overlay" id="delOverlay" style="display:none" onclick="closeOverlay('delOverlay')">
  <div class="sheet" onclick="event.stopPropagation()" style="text-align:center">
    <div style="font-size:46px;margin-bottom:8px">🗑️</div>
    <div style="font-size:16px;font-weight:900;margin-bottom:5px">حذف العرض؟</div>
    <div style="color:var(--muted);font-size:12px;margin-bottom:22px">لا يمكن التراجع عن هذا الإجراء</div>
    <div style="display:flex;gap:9px">
      <button class="btn b-red" onclick="confirmDel()">نعم، احذف</button>
      <button class="btn b-ghost" onclick="closeOverlay('delOverlay')">إلغاء</button>
    </div>
  </div>
</div>

<!-- Detail Sheet -->
<div class="overlay" id="detOverlay" style="display:none" onclick="closeOverlay('detOverlay')">
  <div class="sheet" id="detSheet" onclick="event.stopPropagation()"></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────
const DC = {
  'شمال':{ bg:'#fef2f2', border:'#fca5a5', badge:'#ef4444', text:'#991b1b' },
  'جنوب':{ bg:'#fefce8', border:'#fde047', badge:'#ca8a04', text:'#713f12' },
  'شرق': { bg:'#eff6ff', border:'#93c5fd', badge:'#2563eb', text:'#1e3a8a' },
  'غرب': { bg:'#f0fdf4', border:'#86efac', badge:'#16a34a', text:'#14532d' },
};
const DIRS = ['شمال','جنوب','شرق','غرب'];
const TYPES = ['أرض','فيلا','عمارة','شقة','محل'];
const KEY = 'realestate_v3';
const INSTALL_KEY = 're_install_dismissed';

let offers = [], tab = 0, editId = null, delId = null, showBanner = false;
let search = '';
let toastT = null;

// ─── EMPTY FORM ──────────────────────────────────────────
const EF = () => ({ direction:'', sellerName:'', sellerPhone:'', neighborhood:'', propertyType:'', area:'', streetWidth:'', price:'', notes:'' });
let form = EF();

// ─── INIT ────────────────────────────────────────────────
function init() {
  try { offers = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { offers = []; }
  showBanner = !localStorage.getItem(INSTALL_KEY) && !window.matchMedia('(display-mode: standalone)').matches;
  render();
  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  // PWA install prompt
  window.addEventListener('beforeinstallprompt', e => {
    window._installPrompt = e;
    e.preventDefault();
  });
}

function save() {
  try { localStorage.setItem(KEY, JSON.stringify(offers)); } catch(e) {}
  render();
}

// ─── TOAST ───────────────────────────────────────────────
function toast(msg, type='ok') {
  clearTimeout(toastT);
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  el.style.background = type==='err'?'#dc2626':type==='info'?'#0284c7':'#15803d';
  toastT = setTimeout(() => el.style.display='none', 3000);
}

// ─── NAV ─────────────────────────────────────────────────
function goTab(n) {
  tab = n;
  if (n !== 1 && editId) { editId = null; form = EF(); }
  [0,1,2].forEach(i => document.getElementById('t'+i).className = 'tab'+(i===n?' on':''));
  render();
}

function closeOverlay(id) { document.getElementById(id).style.display='none'; }

// ─── RENDER ──────────────────────────────────────────────
function render() {
  renderStats();
  const st = document.getElementById('stxt');
  const dot = document.getElementById('sdot');
  st.textContent = `${offers.length} عرض • محفوظ على جهازك`;
  dot.className = 'sdot';

  const sc = document.getElementById('scroll');
  if (tab === 0) sc.innerHTML = renderList();
  else if (tab === 1) sc.innerHTML = renderForm();
  else sc.innerHTML = renderStats2();
}

function renderStats() {
  document.getElementById('statsRow').innerHTML = DIRS.map(d => {
    const c = DC[d], n = offers.filter(o=>o.direction===d).length;
    return `<div class="stat" style="background:${c.badge}20;border-color:${c.border}">
      <div class="stat-n" style="color:${c.badge}">${n}</div>
      <div class="stat-l">${d}</div>
    </div>`;
  }).join('');
}

// ─── LIST TAB ────────────────────────────────────────────
function renderList() {
  const fil = filtered();
  let h = '';

  // Install banner
  if (showBanner) {
    h += `<div class="install-banner">
      <div style="font-size:28px">📲</div>
      <div class="install-banner-text">
        <div class="install-banner-title">أضف التطبيق للشاشة الرئيسية</div>
        اضغط <b>مشاركة ↑</b> ثم «إضافة إلى الشاشة الرئيسية» للوصول السريع
      </div>
      <button class="install-x" onclick="dismissBanner()">✕</button>
    </div>`;
  }

  h += `<div class="srow">
    <div class="swrap">
      <span class="sic">🔍</span>
      <input class="inp sinp" type="search" placeholder="بحث..." value="${x(search)}" oninput="search=this.value;renderListOnly()" autocomplete="off">
    </div>
    <button class="btn b-green csvbtn" onclick="exportCSV()">📥 تصدير</button>
  </div>`;

  if (fil.length === 0) {
    h += `<div class="empty">
      <div class="e-ic">${search ? '🔍' : '📋'}</div>
      <div class="e-t">${search ? 'لا نتائج للبحث' : 'لا توجد عروض بعد'}</div>
      ${!search ? `<div class="e-s">اضغط «إضافة» لإدخال أول عرض</div>` : ''}
    </div>`;
  } else {
    fil.forEach((o, i) => {
      const c = DC[o.direction] || { bg:'#f8fafc', border:'#e2e8f0', badge:'#64748b', text:'#1e293b' };
      h += `<div class="card" style="background:${c.bg};border-color:${c.border}" onclick="openDetail('${o.id}')">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px">
          <div style="display:flex;gap:5px;flex-wrap:wrap">
            <span class="chip" style="background:${c.badge}">${o.direction}</span>
            ${o.propertyType ? `<span style="color:${c.text};font-size:10px;background:${c.badge}22;padding:3px 7px;border-radius:6px;font-weight:800">${o.propertyType}</span>` : ''}
          </div>
          <span style="color:#94a3b8;font-size:10px">#${i+1}</span>
        </div>
        <div style="color:${c.text};font-size:15px;font-weight:900;margin-bottom:3px">${x(o.sellerName)}</div>
        <div style="display:flex;justify-content:space-between;align-items:center">
          <span style="color:#64748b;font-size:11px;direction:ltr">${x(o.sellerPhone)}</span>
          <span style="color:${c.badge};font-size:14px;font-weight:900">${o.price ? fp(o.price)+' ﷼' : '—'}</span>
        </div>
        ${o.neighborhood ? `<div style="color:#64748b;font-size:11px;margin-top:3px">📍 ${x(o.neighborhood)}</div>` : ''}
        ${o.area ? `<div style="color:#64748b;font-size:11px;margin-top:2px">📐 ${x(o.area)} م²${o.streetWidth ? ` • شارع ${x(o.streetWidth)}م` : ''}</div>` : ''}
        ${o.notes ? `<div style="color:#64748b;font-size:10px;margin-top:5px;border-top:1px solid ${c.border};padding-top:4px;line-height:1.4">${x(o.notes)}</div>` : ''}
      </div>`;
    });
  }
  return h;
}

function renderListOnly() {
  const sc = document.getElementById('scroll');
  if (tab === 0) sc.innerHTML = renderList();
}

// ─── FORM TAB ────────────────────────────────────────────
function renderForm() {
  const title = editId ? '✏️ تعديل العرض' : '➕ عرض جديد';
  const dirC = form.direction ? DC[form.direction] : null;
  const chip = dirC ? `<span class="chip" style="background:${dirC.badge}">${form.direction}</span>` : '';

  const dirs = DIRS.map(d => {
    const c = DC[d], sel = form.direction === d;
    return `<button class="dbtn" onclick="sf('direction','${d}')"
      style="border-color:${sel?c.badge:c.border};background:${sel?c.bg:'rgba(255,255,255,.03)'};color:${sel?c.text:'#94a3b8'}">${sel?'✓ ':''}${d}</button>`;
  }).join('');

  const types = TYPES.map(t =>
    `<button class="tbtn ${form.propertyType===t?'on':''}" onclick="sf('propertyType','${t}')">${t}</button>`
  ).join('');

  return `<div style="padding-bottom:18px">
    <div class="sec-title">${title} ${chip}</div>

    <div class="field">
      <label class="lbl">الاتجاه *</label>
      <div class="dgrid">${dirs}</div>
    </div>

    <div class="field">
      <label class="lbl">الحي / الموقع</label>
      <input class="inp" type="text" inputmode="text" placeholder="مثال: حي النزهة" value="${x(form.neighborhood||'')}" oninput="form.neighborhood=this.value" autocomplete="off">
    </div>

    <div class="field">
      <label class="lbl">اسم البائع *</label>
      <input class="inp" type="text" inputmode="text" placeholder="مثال: محمد العمري" value="${x(form.sellerName)}" oninput="form.sellerName=this.value" autocomplete="off">
    </div>

    <div class="field">
      <label class="lbl">رقم الجوال *</label>
      <input class="inp" type="tel" inputmode="tel" placeholder="05xxxxxxxx" value="${x(form.sellerPhone)}" oninput="form.sellerPhone=this.value" autocomplete="off" style="direction:ltr;text-align:right">
    </div>

    <div class="field">
      <label class="lbl">نوع العقار *</label>
      <div class="tgrid">${types}</div>
    </div>

    <div class="dual">
      <div>
        <label class="lbl">المساحة (م²) *</label>
        <input class="inp" type="number" inputmode="numeric" placeholder="400" value="${x(form.area)}" oninput="form.area=this.value">
      </div>
      <div>
        <label class="lbl">عرض الشارع (م)</label>
        <input class="inp" type="number" inputmode="numeric" placeholder="15" value="${x(form.streetWidth)}" oninput="form.streetWidth=this.value">
      </div>
    </div>

    <div class="field">
      <label class="lbl">السعر (ريال) *</label>
      <input class="inp" type="text" inputmode="numeric" placeholder="1,200,000" value="${x(form.price)}" oninput="form.price=this.value" autocomplete="off">
    </div>

    <div class="field">
      <label class="lbl">ملاحظات</label>
      <textarea class="inp" rows="3" placeholder="أي ملاحظات إضافية..." oninput="form.notes=this.value">${x(form.notes)}</textarea>
    </div>

    <button class="btn b-gold" style="font-size:15px;padding:15px" onclick="submit()">
      ${editId ? '💾 حفظ التعديل' : '✅ إضافة العرض'}
    </button>
    ${editId ? `<button class="btn b-ghost" style="margin-top:9px" onclick="cancelEdit()">إلغاء</button>` : ''}
    <div class="form-note">💾 البيانات محفوظة على جهازك فقط — بدون إنترنت</div>
  </div>`;
}

// ─── STATS TAB ───────────────────────────────────────────
function renderStats2() {
  if (offers.length === 0) return `<div class="empty"><div class="e-ic">📊</div><div class="e-t">لا توجد بيانات بعد</div></div>`;

  const total = offers.length;
  const byDir = DIRS.map(d => ({ d, n: offers.filter(o=>o.direction===d).length }));
  const byType = TYPES.map(t => ({ t, n: offers.filter(o=>o.propertyType===t).length })).filter(x=>x.n>0);
  const prices = offers.filter(o=>o.price).map(o=>Number(String(o.price).replace(/,/g,'')));
  const avgPrice = prices.length ? Math.round(prices.reduce((a,b)=>a+b,0)/prices.length) : 0;
  const maxPrice = prices.length ? Math.max(...prices) : 0;
  const minPrice = prices.length ? Math.min(...prices) : 0;

  let h = `<div style="padding-bottom:18px">
    <div class="sec-title">📊 إحصائيات العروض</div>

    <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);border-radius:14px;padding:16px;margin-bottom:12px;text-align:center">
      <div style="font-size:42px;font-weight:900;color:var(--gold)">${total}</div>
      <div style="color:var(--muted);font-size:13px">إجمالي العروض</div>
    </div>

    <div style="font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px">توزيع الاتجاهات</div>
    <div style="background:var(--surf2);border-radius:12px;overflow:hidden;margin-bottom:12px">`;

  byDir.forEach(({ d, n }) => {
    const c = DC[d];
    const pct = total ? Math.round(n/total*100) : 0;
    h += `<div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border-bottom:1px solid var(--border)">
      <span class="chip" style="background:${c.badge};width:40px;text-align:center">${d}</span>
      <div style="flex:1;background:rgba(255,255,255,.05);border-radius:6px;height:8px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:${c.badge};border-radius:6px;transition:width .5s"></div>
      </div>
      <span style="color:${c.badge};font-weight:800;font-size:13px;min-width:24px;text-align:left">${n}</span>
    </div>`;
  });

  h += `</div>`;

  if (byType.length > 0) {
    h += `<div style="font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px">حسب نوع العقار</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px">`;
    byType.forEach(({ t, n }) => {
      h += `<div style="background:var(--surf2);border:1px solid var(--border);border-radius:11px;padding:11px;text-align:center">
        <div style="font-size:20px;font-weight:900;color:var(--gold)">${n}</div>
        <div style="color:var(--muted);font-size:11px;margin-top:2px">${t}</div>
      </div>`;
    });
    h += `</div>`;
  }

  if (prices.length > 0) {
    h += `<div style="font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px">السعر (ريال)</div>
    <div style="background:var(--surf2);border-radius:12px;overflow:hidden;margin-bottom:12px">
      ${[['متوسط السعر', fp(avgPrice)], ['أعلى سعر', fp(maxPrice)], ['أقل سعر', fp(minPrice)]].map(([k,v]) => `
        <div class="det-row" style="padding:11px 13px">
          <span class="det-k">${k}</span>
          <span class="det-v" style="color:var(--gold)">${v} ﷼</span>
        </div>`).join('')}
    </div>`;
  }

  h += `<button class="btn b-red" style="margin-top:4px" onclick="clearAll()">🗑️ حذف جميع العروض</button></div>`;
  return h;
}

// ─── DETAIL ──────────────────────────────────────────────
function openDetail(id) {
  const o = offers.find(x=>x.id===id);
  if (!o) return;
  const c = DC[o.direction] || {};
  const rows = [
    ['الحي', o.neighborhood||'—'],
    ['النوع', o.propertyType||'—'],
    ['المساحة', o.area ? o.area+' م²' : '—'],
    ['عرض الشارع', o.streetWidth ? o.streetWidth+' م' : '—'],
    ['السعر', o.price ? fp(o.price)+' ﷼' : '—'],
    ['ملاحظات', o.notes||'—'],
  ].map(([k,v]) => `<div class="det-row"><span class="det-k">${k}</span><span class="det-v">${x(v)}</span></div>`).join('');

  document.getElementById('detSheet').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="chip" style="background:${c.badge||'#64748b'};font-size:13px;padding:5px 13px">${o.direction}</span>
      <button onclick="closeOverlay('detOverlay')" style="background:none;border:none;color:var(--dim);font-size:20px;cursor:pointer;padding:4px">✕</button>
    </div>
    <div style="font-size:19px;font-weight:900;margin-bottom:3px">${x(o.sellerName)}</div>
    <div style="color:var(--muted);font-size:14px;margin-bottom:16px;direction:ltr;text-align:right">${x(o.sellerPhone)}</div>
    ${rows}
    <div class="act-row">
      <button class="btn b-gold" onclick="startEdit('${o.id}')">✏️ تعديل</button>
      <button class="btn b-red" onclick="openDel('${o.id}')">🗑️ حذف</button>
    </div>`;

  document.getElementById('detOverlay').style.display='flex';
}

function startEdit(id) {
  const o = offers.find(x=>x.id===id);
  if (!o) return;
  form = {...o};
  editId = id;
  closeOverlay('detOverlay');
  goTab(1);
}

// ─── FORM ACTIONS ─────────────────────────────────────────
function sf(field, val) { form[field] = val; render(); }

function submit() {
  if (!form.direction || !form.sellerName || !form.sellerPhone || !form.propertyType || !form.area || !form.price) {
    toast('يرجى تعبئة الحقول المطلوبة ⚠️', 'err'); return;
  }
  if (editId) {
    offers = offers.map(o => o.id===editId ? {...form, id:editId} : o);
    toast('✅ تم حفظ التعديل');
  } else {
    offers.unshift({...form, id: gid()});
    toast('✅ تمت إضافة العرض');
  }
  form = EF(); editId = null;
  save();
  goTab(0);
}

function cancelEdit() { form = EF(); editId = null; goTab(0); }

// ─── DELETE ───────────────────────────────────────────────
function openDel(id) { delId = id; closeOverlay('detOverlay'); document.getElementById('delOverlay').style.display='flex'; }
function confirmDel() {
  offers = offers.filter(o=>o.id!==delId);
  toast('🗑️ تم الحذف', 'info');
  closeOverlay('delOverlay');
  save();
}

function clearAll() {
  if (!confirm('⚠️ هل أنت متأكد من حذف جميع العروض؟ لا يمكن التراجع.')) return;
  offers = [];
  toast('🗑️ تم حذف جميع العروض', 'info');
  save();
}

// ─── EXPORT ───────────────────────────────────────────────
function exportCSV() {
  const fil = filtered();
  if (!fil.length) { toast('لا توجد بيانات للتصدير', 'err'); return; }
  const H = ['الاتجاه','اسم البائع','جوال البائع','الحي','نوع العقار','المساحة م²','عرض الشارع م','السعر ريال','ملاحظات'];
  const rows = fil.map(o=>[o.direction,o.sellerName,o.sellerPhone,o.neighborhood,o.propertyType,o.area,o.streetWidth,o.price,o.notes]);
  const csv = '\uFEFF'+[H,...rows].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `عروض_عقارية_${new Date().toLocaleDateString('ar-SA').replace(/\//g,'-')}.csv`;
  a.click();
  toast('📊 تم تصدير '+fil.length+' عرض');
}

// ─── INSTALL BANNER ──────────────────────────────────────
function dismissBanner() {
  showBanner = false;
  localStorage.setItem(INSTALL_KEY, '1');
  render();
}

// ─── HELPERS ─────────────────────────────────────────────
function gid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fp(v) { const n=Number(String(v).replace(/,/g,'')); return isNaN(n)?v:n.toLocaleString('ar-SA'); }
function x(s) { return s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function filtered() {
  if (!search.trim()) return offers;
  const q = search.trim();
  return offers.filter(o=>[o.sellerName,o.sellerPhone,o.direction,o.propertyType,o.neighborhood].some(v=>v?.includes(q)));
}

// ─── START ────────────────────────────────────────────────
init();
</script>
